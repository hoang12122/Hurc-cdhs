
services:
  # == BACKEND ==
  # Đây là ứng dụng Next.js, đóng vai trò là backend.
  # Nó xử lý logic, render trang, và giao tiếp với dữ liệu.
  # Để HA, bạn sẽ nhân bản service này trên nhiều máy chủ và đặt một load balancer ở phía trước.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Không cần map cổng ở đây nữa vì Nginx sẽ xử lý việc đó.
    # ports:
    environment:
      - NODE_ENV=production
      - DATABASE_JSON_PATH=/app/data/offline/db.json
      - YOLO_ENDPOINT=http://yolo-service:5005/detect
      - LLM_ENDPOINT=http://ollama:11434/v1/chat/completions
    env_file:
      - .env
    user: "65532:65532"
    volumes:
      # Mount the entire data/offline folder for persistence (Strict Hardening)
      - ./data/offline:/app/data/offline
      # Sync logs to a persistent volume
      - ./logs:/app/logs
    # Tự động khởi động lại container nếu nó dừng
    restart: unless-stopped
    depends_on:
      init-perms:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      redis:
        condition: service_started

  # == INIT PERMISSIONS ==
  # Giải quyết lỗi "Permission Denied" và khởi tạo hạ tầng dữ liệu bền vững
  init-perms:
    image: alpine
    volumes:
      - ./:/app_root
    command: >
      sh -c "
        mkdir -p /app_root/data/offline /app_root/logs &&
        touch /app_root/data/offline/db.json /app_root/data/offline/db.backup.json &&
        chown -R 65532:65532 /app_root/data/offline /app_root/logs &&
        chmod -R 755 /app_root/data/offline /app_root/logs
      "

  # == DATABASE ==
  postgres:
    image: postgres:15-alpine
    container_name: hurc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-hurc_crm}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"

  mongo:
    image: mongo:7.0
    container_name: hurc_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-hurc_mongouser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-hurc_mongopass}
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db

  # == CACHE & QUEUE ==
  redis:
    image: redis:alpine
    container_name: hurc_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
  
  # == FRONTEND GATEWAY / REVERSE PROXY ==
  # Nginx đóng vai trò là cổng vào cho người dùng.
  # Nó nhận request và chuyển tiếp đến backend (app service).
  # Trong môi trường HA, Nginx cũng có thể hoạt động như một load balancer.
  nginx:
    image: nginx:alpine
    ports:
      # Ánh xạ cổng 80 của máy chủ tới cổng 80 của Nginx.
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    # Đảm bảo Nginx chỉ khởi động sau khi backend (app) đã sẵn sàng.
    depends_on:
      - app
    # Tự động khởi động lại Nginx nếu nó dừng
    restart: unless-stopped

  # == MONITORING & LOGGING (LOKI + GRAFANA) ==
  loki:
    image: grafana/loki:latest
    container_name: hurc_loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: hurc_promtail
    volumes:
      - /var/log:/var/log
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/config.yml
      # Thêm volume để đọc log từ Docker
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Thêm volume để đọc log cấu trúc của ứng dụng
      - ./logs:/var/log/hurc_logs:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: hurc_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped

  # == AI VISION (YOLOv8) ==
  yolo-service:
    build:
      context: ./infra/yolo
    container_name: hurc_yolo
    restart: unless-stopped
    expose:
      - "5005"

  # == AI AGENT (OLLAMA) ==
  ollama:
    image: ollama/ollama:latest
    container_name: hurc_ollama
    restart: unless-stopped
    ports:
      - "3002:11434" # Mapped to 3002 for direct CRM gateway access
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    # Bỏ comment phần dưới nếu máy chủ có GPU NVIDIA để chạy Gemma-4 mượt mà
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
