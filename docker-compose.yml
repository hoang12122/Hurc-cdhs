services:
  postgres:
    image: postgres:16-alpine
    container_name: hurc_postgres
    restart: unless-stopped
    profiles: ["core"]
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-hurc123}
      POSTGRES_DB: ${DATABASE_NAME:-hurc_db}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  mongo:
    image: mongo:latest
    container_name: hurc_mongo
    restart: unless-stopped
    profiles: ["core"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-hurc123}
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ping:1})' --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    container_name: hurc_redis
    restart: unless-stopped
    profiles: ["core"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hurc_app
    restart: unless-stopped
    profiles: ["core"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      mongo:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./audit_reports:/app/audit_reports
    networks:
      - backend-net
      - frontend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: hurc_nginx
    restart: unless-stopped
    profiles: ["core"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - app
    networks:
      - frontend-net

  yolo-service:
    build:
      context: ./infra/yolo
    container_name: hurc_yolo
    restart: unless-stopped
    profiles: ["ai"]
    expose:
      - "5005"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  ollama:
    image: ollama/ollama:latest
    container_name: hurc_ollama
    restart: unless-stopped
    profiles: ["ai"]
    expose:
      - "11434"
    volumes:
      - ./data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - backend-net

  loki:
    image: grafana/loki:latest
    container_name: hurc_loki
    restart: unless-stopped
    profiles: ["obs"]
    networks:
      - backend-net

  grafana:
    image: grafana/grafana:latest
    container_name: hurc_grafana
    restart: unless-stopped
    profiles: ["obs"]
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-hurc123}
    networks:
      - frontend-net

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge