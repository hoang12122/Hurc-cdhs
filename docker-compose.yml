services:
  postgres:
    image: postgres:16-alpine
    container_name: hurc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-hurc123}
      POSTGRES_DB: ${DATABASE_NAME:-hurc_db}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  mongo:
    image: mongo:latest
    container_name: hurc_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-hurc123}
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ping:1})' --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    container_name: hurc_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hurc_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      yolo-service:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./audit_reports:/app/audit_reports
    networks:
      - backend-net
      - frontend-net

  nginx:
    image: nginx:alpine
    container_name: hurc_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - app
    networks:
      - frontend-net

  yolo-service:
    build:
      context: ./infra/yolo
    container_name: hurc_yolo
    restart: unless-stopped
    expose:
      - "5005"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  ollama:
    image: ollama/ollama:latest
    container_name: hurc_ollama
    restart: unless-stopped
    expose:
      - "11434"
    volumes:
      - ./data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  ollama-pull-model:
    image: curlimages/curl:latest
    container_name: hurc_ollama_puller
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - backend-net
    command: >
      sh -c "curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"gemma:2b\"}'"

  loki:
    image: grafana/loki:latest
    container_name: hurc_loki
    restart: unless-stopped
    networks:
      - backend-net

  grafana:
    image: grafana/grafana:latest
    container_name: hurc_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-hurc123}
    networks:
      - frontend-net

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge