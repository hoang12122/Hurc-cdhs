
events {
    worker_connections 1024;
}

http {
    # Hide nginx version for security
    server_tokens off;

    # Set client body buffer size
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 8m; # Max file upload size, adjust as needed
    large_client_header_buffers 2 1k;

    server {
        listen 80;
        server_name localhost;

        # Redirect http to https in production, but keep as http for local dev
        # In a real prod env, you would have an SSL block here.

        location / {
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_redirect off;
        }

        # Cấu hình cho các kết nối WebSocket (quan trọng cho Next.js hot reload)
        location /_next/webpack-hmr {
            proxy_pass http://app:3000/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
