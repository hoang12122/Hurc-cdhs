
events {
    worker_connections 1024;
}

http {
    # Hide nginx version for security
    server_tokens off;

    # BUFFER OVERFLOW PROTECTION (Brutal Audit Fix)
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size 10m;
    large_client_header_buffers 2 1k;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        # SECURITY HEADERS (HURC1 HARDENING)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # HTTPS PREPARATION (Brutal Audit Fix: LAN Sniffing Protection)
        # listen 443 ssl;
        # ssl_certificate /etc/nginx/certs/server.crt;
        # ssl_certificate_key /etc/nginx/certs/server.key;
        # if ($scheme != "https") { return 301 https://$host$request_uri; }

        location / {
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_redirect off;
        }

        # Cấu hình cho các kết nối WebSocket (quan trọng cho Next.js hot reload)
        location /_next/webpack-hmr {
            proxy_pass http://app:3000/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
