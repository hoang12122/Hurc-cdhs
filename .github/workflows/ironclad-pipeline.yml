name: HURC1 IRONCLAD CI/CD PIPELINE

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  audit_and_build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 🟢 Verify Node.js and npm versions (Strict Invariant Check)
        run: |
          if [ ! -f ".nvmrc" ]; then
            echo "❌ Error: .nvmrc file not found!"
            exit 1
          fi
          EXPECTED_NODE=$(cat .nvmrc | tr -d '\r' | tr -d ' ' | sed 's/^v//')
          ACTUAL_NODE=$(node -v | sed 's/^v//')
          echo "Expected Node version: v$EXPECTED_NODE"
          echo "Actual Node version: v$ACTUAL_NODE"
          if [ "$ACTUAL_NODE" != "$EXPECTED_NODE" ]; then
            echo "❌ Node.js version mismatch!"
            exit 1
          fi
          
          ACTUAL_NPM=$(npm -v)
          echo "Actual npm version: $ACTUAL_NPM"
          NPM_MAJOR=$(echo "$ACTUAL_NPM" | cut -d. -f1)
          echo "Actual npm major version: $NPM_MAJOR"
          if [ "$NPM_MAJOR" != "10" ]; then
            echo "❌ npm version is not in range >=10 <11 (Major version must be 10)!"
            exit 1
          fi
          echo "✅ Node.js and npm versions verified successfully!"

      - name: 📦 Install Dependencies
        run: npm ci --include=dev

      - name: ⚙️ Generate Prisma Clients
        run: npm run db:generate:all

      - name: 🧪 Run Typecheck
        run: npm run typecheck

      - name: 🔍 Run Linting
        run: npm run lint

      - name: 🏗️ Verify Next.js Build
        run: npm run build
        env:
          IS_DATABASE_OFFLINE: true

      - name: 🔍 Deep Logic Audit (Mission Critical)
        run: |
          mkdir -p audit_reports
          npx tsx src/scripts/pre-deploy-audit.ts
        env:
          IS_DATABASE_OFFLINE: true

      - name: 🛡️ Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'HIGH,CRITICAL'

      - name: 🏗️ Build Hardened Docker Image
        run: |
          docker build -t hurc1-crm:latest .

      - name: ⚙️ Initialize Environment File (.env)
        run: cp .env.example .env

      - name: 🟢 Start Core Services (Tiered Deploy)
        run: |
          docker compose --profile core up -d

      - name: 🧪 Run Core Smoke Test Gate (Mandatory)
        run: |
          bash scripts/smoke-deploy.sh core

      - name: 🔵 Start AI Services (Tiered Deploy - Optional)
        run: |
          docker compose --profile ai up -d

      - name: 🧪 Run AI Smoke Test Gate (Optional Verification)
        run: |
          bash scripts/smoke-deploy.sh ai

      - name: 🛑 Tear Down Services
        if: always()
        run: |
          docker compose --profile core --profile ai down -v

      - name: 📄 Archive Audit Certificate
        uses: actions/upload-artifact@v4
        with:
          name: deployment-certificate
          path: audit_reports/*.md
